stages:
  - build
  - package
  - release

variables:
  DEB_PACKAGE_NAME: windshape-manipulator
  ROS_PACKAGE_NAME: manipulator
  DEFAULT_PACKAGE_VERSION: "0.1.0"
  PACKAGE_ARCH: arm64
  ROS_DISTRO: humble
  DEBIAN_FRONTEND: noninteractive

.check-docker-access: &check-docker-access |
  docker --version
  if ! docker info >/dev/null 2>&1; then
    echo "ERROR: Docker daemon is not accessible from this GitLab Runner."
    echo "Please make sure the runner user can access /var/run/docker.sock, or run this job on a Docker-capable runner."
    exit 1
  fi

build-verify:
  stage: build
  before_script:
    - echo "=========================================="
    - echo "Starting CI pipeline..."
    - echo "=========================================="
    - echo "System information:"
    - uname -a
    - df -h
    - free -h
    - echo "Docker information:"
    - *check-docker-access
    - echo "=========================================="
    - echo "Checking for existing Docker image..."
    - |
      DOCKERFILE_SHA=$(sha256sum docker/Dockerfile.verify | awk '{print $1}')
      IMAGE_DOCKERFILE_SHA=""
      if docker image inspect manipulator:verify >/dev/null 2>&1; then
        IMAGE_DOCKERFILE_SHA=$(docker image inspect manipulator:verify --format '{{ index .Config.Labels "windshape.dockerfile.sha256" }}' 2>/dev/null || true)
        if [ "${IMAGE_DOCKERFILE_SHA}" = "${DOCKERFILE_SHA}" ]; then
          echo "Docker image already exists and Dockerfile is unchanged, skipping build"
          SKIP_BUILD=true
        else
          echo "Docker image exists but Dockerfile changed, will rebuild"
          echo "Current Dockerfile sha ${DOCKERFILE_SHA}"
          echo "Image Dockerfile sha ${IMAGE_DOCKERFILE_SHA:-none}"
          SKIP_BUILD=false
        fi
      else
        echo "Docker image not found, will build"
        SKIP_BUILD=false
      fi
    - echo "SKIP_BUILD=$SKIP_BUILD"
    - echo "=========================================="
  script:
    - |
      if [ "$SKIP_BUILD" = true ]; then
        echo "Skipping docker build, using existing image"
      else
        echo "=========================================="
        echo "Building docker image..."
        echo "=========================================="
        docker build -f docker/Dockerfile.verify --label windshape.dockerfile.sha256=${DOCKERFILE_SHA} -t manipulator:verify . --progress=plain 2>&1 | tee docker-build.log
        echo "=========================================="
        echo "Docker build completed"
        echo "=========================================="
      fi
    - echo "=========================================="
    - echo "Running docker container..."
    - echo "=========================================="
    - docker run --rm manipulator:verify 2>&1 | tee docker-run.log
    - echo "=========================================="
    - echo "CI pipeline completed successfully!"
    - echo "=========================================="
    - echo "Build artifacts:"
    - ls -la *.log 2>/dev/null || echo "No log files found"
  after_script:
    - echo "=========================================="
    - echo "Pipeline summary:"
    - echo "Build status $CI_JOB_STATUS"
    - echo "Job duration $CI_JOB_DURATION"
    - echo "=========================================="
  only:
    - develop
  tags:
    - manipulator
  artifacts:
    when: always
    paths:
      - docker-build.log
      - docker-run.log
    expire_in: 1 week
    reports:
      junit: docker-run.log

package-deb:
  stage: package
  tags:
    - manipulator
  before_script:
    - *check-docker-access
  script:
    - |
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        export PACKAGE_VERSION="${CI_COMMIT_TAG#v}"
      else
        export PACKAGE_VERSION="${DEFAULT_PACKAGE_VERSION}"
      fi
      export DEB_FILE="${DEB_PACKAGE_NAME}_${PACKAGE_VERSION}_${PACKAGE_ARCH}.deb"
      echo "PACKAGE_VERSION=${PACKAGE_VERSION}" > build.env
      echo "DEB_FILE=${DEB_FILE}" >> build.env
    - bash -n scripts/package_deb.sh
    - PACKAGE_DOCKERFILE_SHA=$(sha256sum docker/Dockerfile.verify | awk '{print $1}')
    - PACKAGE_IMAGE=manipulator:package-${CI_COMMIT_SHORT_SHA}
    - |
      IMAGE_DOCKERFILE_SHA=""
      if docker image inspect ${PACKAGE_IMAGE} >/dev/null 2>&1; then
        IMAGE_DOCKERFILE_SHA=$(docker image inspect ${PACKAGE_IMAGE} --format '{{ index .Config.Labels "windshape.dockerfile.sha256" }}' 2>/dev/null || true)
        if [ "${IMAGE_DOCKERFILE_SHA}" = "${PACKAGE_DOCKERFILE_SHA}" ]; then
          echo "Package docker image already exists for this commit and Dockerfile is unchanged, skipping build"
          SKIP_PACKAGE_BUILD=true
        else
          echo "Package docker image exists but Dockerfile changed, will rebuild"
          echo "Current Dockerfile sha ${PACKAGE_DOCKERFILE_SHA}"
          echo "Image Dockerfile sha ${IMAGE_DOCKERFILE_SHA:-none}"
          SKIP_PACKAGE_BUILD=false
        fi
      else
        echo "Package docker image not found, will build"
        SKIP_PACKAGE_BUILD=false
      fi
    - |
      if [ "${SKIP_PACKAGE_BUILD}" = true ]; then
        echo "Skipping package docker image build"
      else
        docker build -f docker/Dockerfile.verify --label windshape.dockerfile.sha256=${PACKAGE_DOCKERFILE_SHA} -t ${PACKAGE_IMAGE} . --progress=plain 2>&1 | tee docker-package-build.log
      fi
    - rm -rf dist
    - |
      CONTAINER_ID=""
      cleanup_container() {
        if [ -n "${CONTAINER_ID}" ]; then
          docker rm -f "${CONTAINER_ID}" >/dev/null 2>&1 || true
        fi
      }
      trap cleanup_container EXIT
      CONTAINER_ID=$(docker create \
        -e PACKAGE_VERSION="${PACKAGE_VERSION}" \
        -e PACKAGE_ARCH="${PACKAGE_ARCH}" \
        -e DEB_PACKAGE_NAME="${DEB_PACKAGE_NAME}" \
        -e DUMMY_INTERFACE_DIR="/ros_ws/src/dummy-interface" \
        ${PACKAGE_IMAGE} \
        bash -lc "cd /ros_ws/src/arm-platform && ./scripts/package_deb.sh")
      docker start -a ${CONTAINER_ID}
      docker cp ${CONTAINER_ID}:/ros_ws/src/arm-platform/dist ./dist
      cleanup_container
      trap - EXIT
    - echo "Expected deb file dist/${DEB_FILE}"
    - find dist -maxdepth 1 -type f -printf '%f\n' | sort
    - test -f "dist/${DEB_FILE}"
    - dpkg-deb --info dist/${DEB_FILE}
    - dpkg-deb --contents dist/${DEB_FILE}
  artifacts:
    name: "${DEB_PACKAGE_NAME}-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
    when: always
    paths:
      - dist/*.deb
      - dist/*.sha256
      - docker-package-build.log
    reports:
      dotenv: build.env
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  tags:
    - manipulator
  needs:
    - job: package-deb
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - |
      if ! command -v release-cli >/dev/null 2>&1; then
        echo "ERROR: release-cli is not installed on this shell runner."
        echo "Install it on the runner host, for example: sudo install -m 0755 release-cli /usr/local/bin/release-cli"
        exit 1
      fi
  script:
    - release-cli --version
    - echo "Creating release ${CI_COMMIT_TAG}"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "Windshape Manipulator ${CI_COMMIT_TAG}"
    description: |
      ## Windshape Manipulator ${CI_COMMIT_TAG}

      ROS 2 manipulator runtime package for Windshape robot systems.

      ### Install

      ```bash
      sudo dpkg -i dist/${DEB_FILE}
      ```
    assets:
      links:
        - name: "${DEB_FILE}"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/${DEB_FILE}?job=package-deb"
        - name: "${DEB_FILE}.sha256"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/${DEB_FILE}.sha256?job=package-deb"
